{% extends "base.html" %}

{% block content %}

<h2>Delete Instrument</h2>

<p>Are you sure you want to delete:</p>

<strong>{{ instrument.name }}</strong>

<form method="post">
    {% csrf_token %}

    <button class="btn btn-danger">
        Yes, delete
    </button>

    <a href="{% url 'instrument_detail' instrument.id %}" class="btn btn-secondary">
        Cancel
    </a>
</form>

{% endblock %}
